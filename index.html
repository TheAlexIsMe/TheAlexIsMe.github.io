<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells Euphoria | ✨</title>
    <!-- Fonts for that "Cute but Magic" Look -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Charm:wght@700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --soft-pink: #ffb7d5;
            --sakura-pink: #ff99cc;
            --lavender: #c8a2c8;
            --deep-purple: #4b0082;
            --magic-white: #fffafa;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #2e003e 0%, #1a002a 100%);
            color: var(--magic-white);
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Twinkling Stars Background */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.5;
        }

        /* Floating Hearts Animation */
        .floating-heart {
            position: absolute;
            color: var(--sakura-pink);
            font-size: 20px;
            animation: float 6s infinite linear;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* Main Aesthetic Frame */
        .portal-frame {
            width: 90%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 3px solid var(--soft-pink);
            box-shadow: 0 0 30px rgba(255, 183, 213, 0.3);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            position: relative;
        }

        /* Logo Branding */
        .logo-header {
            font-family: 'Pacifico', cursive;
            font-size: 3.5rem;
            background: linear-gradient(to bottom, #ffffff 20%, #ffb7d5 50%, #c8a2c8 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 183, 213, 0.8));
            margin: 0;
        }

        .subtitle {
            font-family: 'Charm', cursive;
            font-size: 1.5rem;
            color: var(--sakura-pink);
            margin-top: -10px;
            margin-bottom: 30px;
        }

        /* Form Styling */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        input[type="text"] {
            width: 80%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--lavender);
            padding: 15px;
            color: white;
            font-size: 1.1rem;
            border-radius: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--soft-pink); background: rgba(255, 255, 255, 0.2); }

        .row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        select {
            background: var(--deep-purple);
            border: 2px solid var(--sakura-pink);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Fredoka';
        }

        button {
            padding: 15px 40px;
            background: linear-gradient(45deg, var(--sakura-pink), var(--lavender));
            color: #2e003e;
            font-family: 'Fredoka';
            font-weight: 600;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 153, 204, 0.4);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 0 25px var(--soft-pink);
        }

        /* The Card Display */
        .reading-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0;
        }

        .card-container {
            width: 160px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .card-container img {
            width: 100%;
            border-radius: 15px;
            border: 4px solid var(--magic-white);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .card-name {
            margin-top: 10px;
            color: var(--soft-pink);
            font-weight: 600;
        }

        /* AI Interpretation Box */
        .ai-response {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed var(--soft-pink);
            padding: 25px;
            border-radius: 25px;
            text-align: left;
            line-height: 1.6;
            display: none;
        }

        .ai-response h3 {
            margin: 0 0 10px 0;
            color: var(--sakura-pink);
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="portal-frame">
        <header>
            <h1 class="logo-header">Mystic Spells</h1>
            <div class="subtitle">✨ Euphoria Readings ✨</div>
        </header>

        <div class="controls">
            <input type="text" id="userQuery" placeholder="Ask the magic cauldron a question...">
            
            <div class="row">
                <select id="spreadType">
                    <option value="Daily">Daily Vibe</option>
                    <option value="Love">Love & Cute Stuff</option>
                    <option value="Money">Hustle & Cash</option>
                    <option value="PastPresentFuture">Past / Present / Future</option>
                </select>

                <select id="cardCount">
                    <option value="1">Quick Answer (1 Card)</option>
                    <option value="3">Deep Magic (3 Cards)</option>
                </select>
            </div>

            <button onclick="castSpell()">✨ CAST SPELL ✨</button>
        </div>

        <div id="display" class="reading-area"></div>

        <div id="aiBox" class="ai-response">
            <h3>💖 The Cauldron Bubbles...</h3>
            <p id="aiContent"></p>
        </div>
    </div>

    <script>
        // Create random floating hearts for the vibe
        for (let i = 0; i < 15; i++) {
            let heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '♥';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(heart);
        }

        // Card Data - Replace these placeholder images with your actual card art!
        const deck = [
            { name: "The Fool", msg: "A fresh start is coming! Take a leap of faith, it's going to be so cute.", img: "https://placehold.jp/24/ffb7d5/ffffff/200x350.png?text=The+Fool" },
            { name: "The Lovers", msg: "Double the trouble, double the fun! Connections are glowing right now.", img: "https://placehold.jp/24/ffb7d5/ffffff/200x350.png?text=The+Lovers" },
            { name: "The Star", msg: "Hope is shining on you. Your dreams are totally valid, babe.", img: "https://placehold.jp/24/ffb7d5/ffffff/200x350.png?text=The+Star" },
            { name: "The Sun", msg: "Pure happiness! Everything you touch turns to gold today.", img: "https://placehold.jp/24/ffb7d5/ffffff/200x350.png?text=The+Sun" },
            { name: "The Moon", msg: "Trust your gut feelings. Things are a bit mysterious, but you got this.", img: "https://placehold.jp/24/ffb7d5/ffffff/200x350.png?text=The+Moon" }
        ];

        function castSpell() {
            const count = parseInt(document.getElementById('cardCount').value);
            const display = document.getElementById('display');
            const aiBox = document.getElementById('aiBox');
            const aiContent = document.getElementById('aiContent');
            const query = document.getElementById('userQuery').value;

            display.innerHTML = "";
            aiBox.style.display = "block";

            let picked = [...deck].sort(() => 0.5 - Math.random()).slice(0, count);

            picked.forEach((card, i) => {
                setTimeout(() => {
                    display.innerHTML += `
                        <div class="card-container">
                            <img src="${card.img}" alt="${card.name}">
                            <div class="card-name">${card.name}</div>
                        </div>
                    `;
                }, i * 300);
            });

            let responseText = query ? `Checking the stars for "${query}"... ` : "The spirits have a message for you! ";
            responseText += picked.map(c => c.msg).join(" ");
            aiContent.innerText = responseText;
        }
    </script>
</body>
</html>
