<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells Euphoria | Tarot Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>
    
    <header>
        <h1 class="glow-text">MYSTIC SPELLS EUPHORIA</h1>
        <p class="subtitle">Guided by the Spirits of Los Santos</p>
    </header>

    <main class="container">
        <section class="controls">
            <div class="input-group">
                <label>Seeker's Question:</label>
                <input type="text" id="userQuestion" placeholder="What does the veil reveal?">
            </div>

            <div class="selection-grid">
                <select id="readingType">
                    <option value="general">General Guidance</option>
                    <option value="relationship">Love & Relationships</option>
                    <option value="money">Wealth & Fortune</option>
                    <option value="luck">Luck & Fate</option>
                </select>

                <select id="spreadType">
                    <option value="single">Straight Answer (1 Card)</option>
                    <option value="triple">Deep Reading (3+ Cards)</option>
                </select>
            </div>

            <button id="drawBtn" onclick="performReading()">Invoke the Cards</button>
        </section>

        <section id="readingDisplay" class="reading-display">
            <!-- Cards will appear here via JS -->
        </section>

        <section id="interpretation" class="ai-box">
            <h3 id="aiTitle"></h3>
            <p id="aiResponse"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
