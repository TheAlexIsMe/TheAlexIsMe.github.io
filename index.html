<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells Euphoria | The Grand Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Charm:wght@700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sakura: #ffb7d5;
            --petal: #ff99cc;
            --void: #1a002a;
            --gold-glow: #f3e5ab;
            --glass-white: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #2e003e 0%, #0a000a 100%);
            color: white;
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Sparkle Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            pointer-events: none;
            opacity: 0.3;
            z-index: 10;
        }

        /* The Main Magical Frame */
        .portal {
            width: 95%;
            max-width: 1200px;
            background: var(--glass-white);
            backdrop-filter: blur(25px);
            border: 4px solid var(--sakura);
            border-radius: 50px;
            padding: 50px;
            box-shadow: 0 0 60px rgba(255, 183, 213, 0.2), inset 0 0 30px rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .header-img {
            max-width: 300px;
            filter: drop-shadow(0 0 15px var(--sakura));
            margin-bottom: 20px;
            animation: floatLogo 4s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* Advanced Input Styling */
        .search-container {
            position: relative;
            max-width: 700px;
            margin: 0 auto 40px;
        }

        input[type="text"] {
            width: 100%;
            padding: 20px 30px;
            background: rgba(0,0,0,0.4);
            border: 3px solid var(--petal);
            border-radius: 40px;
            color: var(--sakura);
            font-size: 1.2rem;
            outline: none;
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(255, 153, 204, 0.2);
        }

        input:focus { border-color: white; box-shadow: 0 0 30px var(--sakura); }

        .btn-cast {
            background: linear-gradient(45deg, var(--petal), #c8a2c8);
            border: none;
            padding: 18px 50px;
            border-radius: 40px;
            font-family: 'Pacifico';
            font-size: 1.6rem;
            color: #2e003e;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        .btn-cast:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 35px var(--petal);
            color: white;
        }

        /* 3D Card Area */
        .spread-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .card-wrapper {
            perspective: 1000px;
            opacity: 0;
            transform: translateY(30px);
            transition: 0.8s all ease;
        }

        .card-wrapper.show { opacity: 1; transform: translateY(0); }

        .tarot-inner {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--sakura);
            border-radius: 25px;
            padding: 15px;
            height: 100%;
            transition: 0.5s;
            transform-style: preserve-3d;
        }

        .tarot-inner:hover {
            transform: rotateY(10deg) rotateX(5deg);
            border-color: white;
            box-shadow: 0 20px 40px rgba(255, 183, 213, 0.3);
        }

        .tarot-inner img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .card-pos-label {
            font-family: 'Charm';
            color: var(--petal);
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .card-name { font-size: 1.3rem; margin-bottom: 10px; color: var(--gold-glow); }

        .card-meaning {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #eee;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        /* Loading Animation */
        #cauldron-load {
            display: none;
            font-size: 3rem;
            margin: 40px;
            animation: bubble 1.5s infinite;
        }

        @keyframes bubble {
            0%, 100% { transform: scale(1); filter: hue-rotate(0deg); }
            50% { transform: scale(1.2); filter: hue-rotate(90deg); }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="portal">
    <!-- Optional: Replace src with image-2025-11-01-075837122-removebg-preview.jpg if uploaded -->
    <h1 style="font-family:'Pacifico'; font-size: 4rem; color: var(--sakura); margin:0;">Mystic Spells</h1>
    <p style="font-family:'Charm'; font-size:1.8rem; color:var(--petal); margin-bottom:30px;">✨ Euphoria Readings ✨</p>

    <div class="search-container">
        <input type="text" id="seekerQuestion" placeholder="What does your soul wish to ask?">
        <div style="margin-top: 20px;">
            <select id="readingType" style="padding:10px; border-radius:15px; background:var(--void); color:white; border:2px solid var(--sakura);">
                <option value="PastPresentFuture">Past, Present, Future Spread</option>
                <option value="Love">Love & Connection Spread</option>
                <option value="Career">Hustle & Success Spread</option>
            </select>
        </div>
        <button class="btn-cast" onclick="performRitual()">Cast the Spell</button>
    </div>

    <div id="cauldron-load">🔮✨🌙</div>

    <div id="readingResult" class="spread-layout">
        <!-- 3 Cards will be injected here -->
    </div>
</div>

<script>
    const deck = [
        { name: "The Magician", meaning: "The power of creation. You have all the tools needed for your current hustle in Los Santos.", img: "https://bit.ly/3QY9Z1A" },
        { name: "The High Priestess", meaning: "Intuition and secrets. Someone at Mystic Spells might be hiding something, or you need to trust your gut.", img: "https://bit.ly/47mH9E2" },
        { name: "The Lovers", meaning: "Harmony and choice. A major decision regarding a partner or a close friend is coming.", img: "https://bit.ly/3SK6uX8" },
        { name: "The Tower", meaning: "Sudden change. The foundation is shaking, but it's clearing space for something better.", img: "https://bit.ly/3u6Yx8n" },
        { name: "The Star", meaning: "Hope and healing. The spirits are guiding you toward a peaceful and lucky outcome.", img: "https://bit.ly/40L3Z6Y" },
        { name: "Death", meaning: "Transformation. A chapter of your life is ending so a beautiful new one can begin.", img: "https://bit.ly/3R3Kq7O" },
        { name: "The Empress", meaning: "Abundance and nurturing. Your creative projects or business ventures are about to bloom.", img: "https://bit.ly/3G5Z9U8" }
    ];

    const labels = ["The Past", "The Present", "The Future"];

    function performRitual() {
        const resultArea = document.getElementById('readingResult');
        const loader = document.getElementById('cauldron-load');
        
        resultArea.innerHTML = "";
        loader.style.display = "block";

        setTimeout(() => {
            loader.style.display = "none";
            
            // Draw 3 Random Cards
            let shuffled = [...deck].sort(() => 0.5 - Math.random());
            let selection = shuffled.slice(0, 3);

            selection.forEach((card, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.innerHTML = `
                    <div class="tarot-inner">
                        <div class="card-pos-label">${labels[i]}</div>
                        <img src="${card.img}" alt="${card.name}">
                        <div class="card-name">✨ ${card.name} ✨</div>
                        <div class="card-meaning">${card.meaning}</div>
                    </div>
                `;
                resultArea.appendChild(wrapper);
                
                // Staggered entrance animation
                setTimeout(() => wrapper.classList.add('show'), i * 400);
            });
        }, 1500);
    }
</script>

</body>
</html>
