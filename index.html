<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells | High-End Divination Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sakura: #ffb7d5;
            --lavender: #c8a2c8;
            --void: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #d4af37;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--void);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Particles Background */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .container {
            width: 95%;
            max-width: 1400px;
            padding: 80px 20px;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* Branding */
        header { margin-bottom: 60px; }
        
        .brand-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            letter-spacing: 20px;
            background: linear-gradient(to bottom, #fff, var(--sakura), var(--lavender));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 183, 213, 0.5));
            text-transform: uppercase;
        }

        .brand-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--sakura);
            letter-spacing: 8px;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* Main Ritual Interface */
        .ritual-frame {
            background: var(--glass);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 183, 213, 0.2);
            padding: 60px 40px;
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            margin-bottom: 80px;
        }

        .input-group { margin-bottom: 40px; }

        input[type="text"] {
            width: 100%;
            max-width: 800px;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--sakura);
            padding: 15px 0;
            color: #fff;
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            text-align: center;
            outline: none;
            transition: 0.4s;
        }

        input[type="text"]:focus { border-color: #fff; transform: scale(1.02); }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        select {
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--sakura);
            color: var(--sakura);
            padding: 12px 25px;
            font-family: 'Montserrat';
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .invoke-btn {
            margin-top: 40px;
            padding: 22px 80px;
            background: linear-gradient(45deg, var(--sakura), var(--lavender));
            border: none;
            color: #000;
            font-family: 'Cinzel Decorative';
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 6px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 183, 213, 0.3);
            transition: 0.4s;
        }

        .invoke-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 50px var(--sakura);
            color: #fff;
        }

        /* Card Spread */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .card-slot { opacity: 0; transform: translateY(40px); transition: 0.8s ease-out; }
        .card-slot.active { opacity: 1; transform: translateY(0); }

        .card-box {
            background: #111;
            border: 1px solid rgba(255, 183, 213, 0.1);
            padding: 25px;
            height: 100%;
            transition: 0.4s;
        }

        .card-box:hover { border-color: var(--sakura); transform: translateY(-10px); }

        .card-box img {
            width: 100%;
            filter: sepia(0.3) brightness(0.8);
            margin-bottom: 20px;
        }

        .pos-tag {
            font-family: 'Cinzel Decorative';
            font-size: 0.7rem;
            color: var(--sakura);
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card-title { font-family: 'Playfair Display'; font-size: 2rem; margin-bottom: 10px; }

        .card-meaning { font-size: 0.95rem; color: #ccc; line-height: 1.5; text-align: justify; }

        /* AI Narrative Summary */
        .summary-box {
            margin-top: 80px;
            padding: 60px 40px;
            border-top: 1px solid rgba(255, 183, 213, 0.1);
            display: none;
        }

        #aiDecree {
            font-family: 'Playfair Display';
            font-size: 2.2rem;
            max-width: 900px;
            margin: 0 auto;
            color: var(--sakura);
            line-height: 1.4;
        }

        .loader {
            display: none;
            width: 60px; height: 60px;
            border: 3px solid rgba(255, 183, 213, 0.1);
            border-top-color: var(--sakura);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 50px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
    <header>
        <h1 class="brand-title">Mystic Spells</h1>
        <div class="brand-subtitle">The Premiere Occult Sanctuary for the Elite</div>
    </header>

    <div class="ritual-frame">
        <div class="input-group">
            <input type="text" id="seekerQuestion" placeholder="COMMUNE WITH THE ARCHETYPES...">
        </div>
        
        <div class="control-row">
            <select id="spreadType">
                <option value="Timeline">Timeline: Past, Present, Future</option>
                <option value="Holistic">Holistic: Mind, Body, Spirit</option>
                <option value="Advice">Advice: Situation, Blockage, Outcome</option>
            </select>
            <select id="drawDepth">
                <option value="1">Direct Insight (1 Card)</option>
                <option value="3" selected>The Trifecta (3 Cards)</option>
                <option value="5">The Grand Revelation (5 Cards)</option>
            </select>
        </div>

        <button class="invoke-btn" onclick="startRitual()">Invoke the Spirits</button>
    </div>

    <div class="loader" id="ritualLoader"></div>
    <div class="card-grid" id="cardDisplay"></div>

    <div class="summary-box" id="decreeBox">
        <div class="pos-tag">THE ORACLE'S DECREE</div>
        <p id="aiDecree"></p>
    </div>
</div>

<script>
    // Particle Background Engine
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
            this.color = `rgba(255, 183, 213, ${Math.random() * 0.5})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function init() {
        resize();
        particles = [];
        for (let i = 0; i < 150; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    init(); animate();

    // Tarot Ritual Engine
    const deck = [
        { name: "The Magician", img: "https://upload.wikimedia.org/wikipedia/en/d/de/RWS_Tarot_01_Magician.jpg", msg: "You have all the tools to manifest your vision. Step into your power." },
        { name: "The High Priestess", img: "https://upload.wikimedia.org/wikipedia/en/8/8d/RWS_Tarot_02_High_Priestess.jpg", msg: "The veil is thin. Trust your intuition over the city's noise." },
        { name: "The Empress", img: "https://upload.wikimedia.org/wikipedia/en/d/d2/RWS_Tarot_03_Empress.jpg", msg: "Creative abundance flows through you. Nurture your newest projects." },
        { name: "The Emperor", img: "https://upload.wikimedia.org/wikipedia/en/c/c3/RWS_Tarot_04_Emperor.jpg", msg: "Order and authority are required. Establish your sovereignty firmly." },
        { name: "Death", img: "https://upload.wikimedia.org/wikipedia/en/d/d7/RWS_Tarot_13_Death.jpg", msg: "Transformation is inevitable. Shed the old skin to make room for rebirth." },
        { name: "The Star", img: "https://upload.wikimedia.org/wikipedia/en/d/db/RWS_Tarot_17_Star.jpg", msg: "Hope and renewal are shining upon you. Your path is divinely guided." },
        { name: "The Sun", img: "https://upload.wikimedia.org/wikipedia/en/1/17/RWS_Tarot_19_Sun.jpg", msg: "Absolute clarity and joy. Success is yours to claim under the light of truth." },
        { name: "Strength", img: "https://upload.wikimedia.org/wikipedia/en/f/f5/RWS_Tarot_08_Strength.jpg", msg: "Tame your inner shadows with compassion. Courage is found in the soft touch." }
    ];

    function startRitual() {
        const grid = document.getElementById('cardDisplay');
        const loader = document.getElementById('ritualLoader');
        const box = document.getElementById('decreeBox');
        const decree = document.getElementById('aiDecree');
        const count = parseInt(document.getElementById('drawDepth').value);
        const style = document.getElementById('spreadType').value;
        const q = document.getElementById('seekerQuestion').value;

        grid.innerHTML = "";
        box.style.display = "none";
        loader.style.display = "block";

        let labels = ["The Past", "The Present", "The Future"];
        if(style === "Holistic") labels = ["Mind", "Body", "Spirit"];
        if(style === "Advice") labels = ["Situation", "Blockage", "Outcome"];

        setTimeout(() => {
            loader.style.display = "none";
            let selection = [...deck].sort(() => 0.5 - Math.random()).slice(0, count);

            selection.forEach((card, i) => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="card-box">
                        <div class="pos-tag">${labels[i] || "Energy"}</div>
                        <img src="${card.img}" alt="${card.name}">
                        <div class="card-title">${card.name}</div>
                        <div class="card-meaning">${card.msg}</div>
                    </div>
                `;
                grid.appendChild(slot);
                setTimeout(() => slot.classList.add('active'), i * 300);
            });

            box.style.display = "block";
            decree.innerText = q ? `Regarding "${q}"... The spirits speak through ${selection[0].name}. Your destiny is tethered to the power of ${selection[selection.length-1].name}.` : "The spirits have looked into the void. Your journey is clear.";
        }, 2000);
    }
</script>

</body>
</html>
