<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mystic Spells | Elite Arcanum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="preloader">
        <div class="loader-wrapper">
            <span class="loader-letter">C</span><span class="loader-letter">o</span><span class="loader-letter">n</span>
            <span class="loader-letter">j</span><span class="loader-letter">u</span><span class="loader-letter">r</span>
            <span class="loader-letter">i</span><span class="loader-letter">n</span><span class="loader-letter">g</span>
            <div class="loader"></div>
        </div>
    </div>

    <div class="black-hole" id="tunnel"></div>

    <div class="portal-container">
        <header>
            <div class="radio-inputs">
                <label class="radio"><input type="radio" name="deckType" value="Full" checked><span class="name">Full Deck</span></label>
                <label class="radio"><input type="radio" name="deckType" value="Major"><span class="name">Major</span></label>
                <label class="radio"><input type="radio" name="deckType" value="Minor"><span class="name">Minor</span></label>
            </div>
            <img src="https://i.imgur.com/6NZVG2f.png" class="main-logo">
        </header>

        <div class="ritual-vault">
            <input type="text" id="seekerQ" placeholder="WHISPER TO THE VOID...">
            <select id="readingCat">
                <option value="Daily">Daily Practice</option>
                <option value="Love">Love & Connection</option>
                <option value="Career">Career & Hustle</option>
            </select>
            <select id="drawNum">
                <option value="1">1 Card</option>
                <option value="3" selected>3 Cards</option>
                <option value="5">5 Cards</option>
            </select>
            <br>
            <button class="button" onclick="executeRitual()">
                <div class="text">INVOKE THE ARCHETYPES</div>
            </button>
        </div>

        <div class="card-grid" id="output"></div>
        <div class="oracle-box" id="oracleBox"><p id="aiText"></p></div>
    </div>

    <script src="cards.js"></script>
    <script src="script.js"></script>
    <script>
        const t = document.getElementById('tunnel');
        for(let i=1; i<=15; i++) {
            const r = document.createElement('div');
            r.className = 'ring';
            r.style.width = r.style.height = `${i*10}%`;
            r.style.animationDelay = `${i*0.6}s`;
            t.appendChild(r);
        }
    </script>
</body>
</html>
