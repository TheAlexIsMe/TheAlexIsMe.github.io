<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells | Elite Arcanum</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sakura: #ffb7d5;
            --lavender: #c8a2c8;
            --void: #0a0a0c;
            --gold: #d0a756;
            --glass-border: rgba(255, 183, 213, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--void);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        /* --- MYSTICAL LOADER --- */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease-out;
        }

        .loader-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 200px; height: 200px;
            font-family: "Cinzel Decorative", serif;
            color: white;
        }

        .loader {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            animation: loader-rotate 2s linear infinite;
        }

        @keyframes loader-rotate {
            0% { transform: rotate(0deg); box-shadow: 0 5px 15px 0 #fff inset, 0 10px 20px 0 #ad5fff inset; }
            100% { transform: rotate(360deg); box-shadow: 0 5px 15px 0 #fff inset, 0 10px 20px 0 #ad5fff inset; }
        }

        /* --- BLACK HOLE BACKGROUND (FIXED Z-INDEX) --- */
        .background-system {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            overflow: hidden;
        }

        .aura {
            position: absolute; top: -50%; left: 50%; transform: translateX(-50%);
            width: 60%; height: 200%;
            background: linear-gradient(to bottom, #00f8f115, #fe848f25, #ffbd1e15);
            filter: blur(100px); animation: aura-glow 8s infinite alternate;
        }

        .ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; border: 1.5px solid rgba(255, 255, 255, 0.08);
            animation: ring-pulse 8s infinite linear;
        }

        @keyframes ring-pulse { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 180%; height: 180%; opacity: 0; } }

        /* --- MAIN UI --- */
        .content-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            text-align: center;
        }

        .brand-logo {
            max-width: 450px;
            width: 100%;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 25px var(--sakura));
        }

        .ritual-box {
            background: rgba(10, 10, 12, 0.75);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            margin: 0 auto 50px;
        }

        input {
            width: 100%; max-width: 700px; background: transparent; border: none;
            border-bottom: 2px solid var(--sakura); color: #fff; padding: 15px;
            font-size: 1.8rem; text-align: center; outline: none; margin-bottom: 30px;
            font-family: 'Playfair Display', serif;
        }

        /* NEOMORPHIC BUTTON */
        .btn-invoke {
            background: #0d0d0f;
            border-radius: 12px;
            box-shadow: inset 0px -4px 15px rgba(255, 183, 213, 0.15), 0 8px 20px rgba(0,0,0,0.5);
            border: 1.5px solid var(--sakura);
            cursor: pointer; padding: 20px 50px; color: var(--gold);
            font-family: 'Cinzel Decorative'; font-weight: 700; letter-spacing: 5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-invoke:hover { background: var(--sakura); color: #000; transform: scale(1.05); box-shadow: 0 0 40px var(--sakura); }

        /* --- CARD SYSTEM (FIXED CLIPPING & ALIGNMENT) --- */
        .card-grid {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 40px; margin-top: 40px;
        }

        .mystic-card {
            position: relative; width: 280px; height: 440px;
            background: #000; border-radius: 24px; cursor: pointer;
            border: 2px solid var(--glass-border);
            overflow: hidden; /* CRITICAL: Fixed the black corner clipping */
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: translateY(40px); transition: 0.7s ease-out;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .mystic-card.active { opacity: 1; transform: translateY(0); }

        .mystic-card img {
            width: 100%; height: auto; 
            padding: 8px; /* Internal margin so card border shows around art */
            border-radius: 24px; 
            display: block;
        }

        .card-name-text {
            font-family: 'Cinzel Decorative'; color: var(--sakura);
            font-size: 1.3rem; margin-top: auto; padding-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 183, 213, 0.5);
        }

        /* Hover Reveal Definition */
        .mystic-card::before, .mystic-card::after {
            position: absolute; content: ""; width: 0%; height: 0%;
            background-color: rgba(10, 10, 12, 0.97); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; align-items: center; justify-content: center;
            padding: 30px; color: var(--sakura); font-size: 1.1rem; text-align: center;
            z-index: 10; font-family: 'Playfair Display'; font-style: italic; line-height: 1.6;
        }

        .mystic-card::before { top: 0; right: 0; border-radius: 0 24px 0 100%; }
        .mystic-card::after { bottom: 0; left: 0; border-radius: 0 100% 0 24px; }

        .mystic-card:hover::before, .mystic-card:hover::after { width: 100%; height: 100%; border-radius: 24px; }
        .mystic-card:hover::after { content: attr(data-meaning); }

    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-wrapper">
            <span style="letter-spacing:8px; font-weight:700;">CONJURING</span>
            <div class="loader"></div>
        </div>
    </div>

    <div class="background-system">
        <div class="tunnel" id="ringContainer"></div>
        <div class="aura"></div>
    </div>

    <div class="content-container">
        <header>
            <img src="https://i.imgur.com/6NZVG2f.png" class="brand-logo" alt="Mystic Spells">
        </header>

        <div class="ritual-box">
            <input type="text" id="userQuestion" placeholder="Whisper your inquiry to the void...">
            <div style="margin-bottom: 30px;">
                <select id="readingType" style="background:#000; color:var(--sakura); border:1px solid var(--sakura); padding:12px; border-radius:8px; margin-right:15px;">
                    <option value="Daily">Daily Practice</option>
                    <option value="Love">Love & Connection</option>
                    <option value="Career">Career & Success</option>
                </select>
                <select id="drawCount" style="background:#000; color:var(--sakura); border:1px solid var(--sakura); padding:12px; border-radius:8px;">
                    <option value="1">1 Card</option>
                    <option value="3" selected>3 Cards</option>
                    <option value="5">5 Cards</option>
                </select>
            </div>
            <button class="btn-invoke" onclick="castRitual()">INVOKE THE ARCHETYPES</button>
        </div>

        <div class="card-grid" id="ritualDisplay"></div>
    </div>

    <script>
        // Generate Rings for Black Hole
        const ringContainer = document.getElementById('ringContainer');
        for(let i=0; i<12; i++) {
            let ring = document.createElement('div');
            ring.className = 'ring';
            ring.style.animationDelay = `${i * 0.8}s`;
            ringContainer.appendChild(ring);
        }

        // Loader Timer (Set to 10s as requested)
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => document.getElementById('preloader').style.display = 'none', 1000);
            }, 10000); 
        });

        const tarotCards = [
            { name: "The Fool", img: "https://i.imgur.com/IBrMUUS.png", meaning: "Endings and new beginnings. Step into the unknown with faith." },
            { name: "The Magician", img: "https://i.imgur.com/5PidMHl.png", meaning: "Manifestation and power. You have all the tools to succeed." },
            { name: "The High Priestess", img: "https://i.imgur.com/xrsmWEA.png", meaning: "Intuition and sacred knowledge. The answers are within." },
            { name: "The Empress", img: "https://i.imgur.com/RvakGCX.png", meaning: "Abundance and nurturing. Creative projects are blooming." },
            { name: "The Emperor", img: "https://i.imgur.com/K4oVvvj.png", meaning: "Structure and authority. Establish your boundaries." },
            { name: "The Hierophant", img: "https://i.imgur.com/GRF1erw.png", meaning: "Tradition and wisdom. Seek guidance from established orders." },
            { name: "The Lovers", img: "https://i.imgur.com/DVAdlIA.png", meaning: "Harmony and choices. Align your heart with your values." },
            { name: "The Chariot", img: "https://i.imgur.com/K5lk6Om.png", meaning: "Control and victory. Drive forward with total determination." },
            { name: "Strength", img: "https://i.imgur.com/WF9jYOf.png", meaning: "Inner resilience and patience. Lead with compassion." }
        ];

        function castRitual() {
            const display = document.getElementById('ritualDisplay');
            const count = parseInt(document.getElementById('drawCount').value);
            display.innerHTML = "";

            // Shuffle and Draw
            let draw = [...tarotCards].sort(() => 0.5 - Math.random()).slice(0, count);

            draw.forEach((card, i) => {
                const el = document.createElement('div');
                el.className = 'mystic-card';
                el.setAttribute('data-meaning', card.meaning);
                el.innerHTML = `
                    <img src="${card.img}" alt="${card.name}">
                    <div class="card-name-text">${card.name}</div>
                `;
                display.appendChild(el);
                
                // Entrance animation
                setTimeout(() => el.classList.add('active'), i * 250);
            });
        }
    </script>
</body>
</html>
