<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells | Professional Oracle Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette matched to image-2025-11-01-075837122-removebg-preview.jpg */
            --sakura-pink: #ffb7d5;
            --mystic-purple: #c8a2c8;
            --deep-obsidian: #0a0a0b;
            --gold-accent: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); }

        body {
            margin: 0;
            background-color: var(--deep-obsidian);
            background-image: radial-gradient(circle at 50% 50%, #1e0030 0%, #050505 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 80px 20px; text-align: center; }

        /* Branding */
        .main-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 4.5rem;
            background: linear-gradient(to bottom, #fff, var(--sakura-pink), var(--mystic-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 0 20px rgba(255, 183, 213, 0.4));
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--mystic-purple);
            letter-spacing: 4px;
            margin-bottom: 50px;
        }

        /* Interaction Dashboard */
        .ritual-vault {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 183, 213, 0.2);
            padding: 50px;
            border-radius: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            margin-bottom: 80px;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--sakura-pink);
            padding: 20px 0;
            color: #fff;
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            text-align: center;
            outline: none;
            margin-bottom: 30px;
        }

        .controls-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

        select {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--mystic-purple);
            color: var(--sakura-pink);
            padding: 15px 25px;
            font-family: 'Montserrat';
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-invoke {
            background: linear-gradient(45deg, var(--sakura-pink), var(--mystic-purple));
            color: #000;
            border: none;
            padding: 20px 80px;
            font-family: 'Cinzel Decorative';
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 5px;
            cursor: pointer;
            margin-top: 40px;
            box-shadow: 0 0 30px rgba(255, 183, 213, 0.3);
        }

        .btn-invoke:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--sakura-pink);
            color: #fff;
        }

        /* Reading Spread */
        .spread-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 60px;
        }

        .card-frame {
            opacity: 0;
            transform: scale(0.9) translateY(40px);
        }

        .card-frame.revealed { opacity: 1; transform: scale(1) translateY(0); }

        .card-art {
            background: #111;
            border: 1px solid var(--mystic-purple);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .card-art::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .card-art:hover::before { left: 150%; }

        .card-art img {
            width: 100%;
            filter: grayscale(0.2) contrast(1.1) brightness(0.9);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pos-label {
            font-family: 'Cinzel Decorative';
            font-size: 0.8rem;
            color: var(--sakura-pink);
            letter-spacing: 5px;
            margin-bottom: 15px;
        }

        .card-title {
            font-family: 'Playfair Display';
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .card-meaning {
            font-size: 0.95rem;
            color: #bbb;
            text-align: justify;
            line-height: 1.5;
            border-top: 1px solid rgba(255, 183, 213, 0.1);
            padding-top: 15px;
        }

        /* Loading & Summary */
        .oracle-summary {
            margin-top: 80px;
            padding: 60px;
            border-top: 1px solid var(--glass);
            display: none;
        }

        #summaryText {
            font-family: 'Playfair Display';
            font-size: 2.2rem;
            max-width: 900px;
            margin: 0 auto;
            color: var(--sakura-pink);
        }

        .loader {
            display: none;
            width: 60px;
            height: 60px;
            border: 3px solid var(--glass);
            border-top: 3px solid var(--sakura-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="main-title">MYSTIC SPELLS</h1>
        <div class="tagline">EUPHORIA READINGS & OCCULT CONSULTANCY</div>
    </header>

    <div class="ritual-vault">
        <input type="text" id="seekerInput" placeholder="WHAT DOES THE VEIL CONCEAL FROM YOU?">
        
        <div class="controls-row">
            <select id="spreadStyle">
                <option value="PastPresentFuture">Timeline: Past, Present, Future</option>
                <option value="MindBodySpirit">Holistic: Mind, Body, Spirit</option>
                <option value="Crossroads">Crossroads: Situation, Obstacle, Advice</option>
            </select>
            <select id="cardDepth">
                <option value="1">Direct Insight (1 Card)</option>
                <option value="3">Deep Revelation (3 Cards)</option>
                <option value="5">The Grand Oracle (5 Cards)</option>
            </select>
        </div>

        <button class="btn-invoke" onclick="beginReading()">INVOKE THE SPIRITS</button>
    </div>

    <div class="loader" id="ritualLoader"></div>

    <div class="spread-display" id="spreadOutput"></div>

    <div class="oracle-summary" id="summaryBox">
        <div class="pos-label">THE ORACLE'S DECREE</div>
        <p id="summaryText"></p>
    </div>
</div>

<script>
    // FULL PROFESSIONAL DECK (Expanded Database)
    const tarotDeck = [
        { name: "The Magician", img: "https://i.imgur.com/vHq06qE.jpg", msg: "You possess the raw power to manifest your desires. Align your will with your actions." },
        { name: "The High Priestess", img: "https://i.imgur.com/oD4jYg0.jpg", msg: "The answer lies within. Silence the noise of the city and trust your inner intuition." },
        { name: "The Empress", img: "https://i.imgur.com/u7P3z5S.jpg", msg: "Abundance is flowing toward you. Nurture your projects and watch them bloom into success." },
        { name: "The Emperor", img: "https://i.imgur.com/0P6sD6u.jpg", msg: "Control and authority are required. Establish your boundaries and lead with a firm hand." },
        { name: "The Hierophant", img: "https://i.imgur.com/V9r9p0O.jpg", msg: "Seek wisdom in tradition. A mentor or an established order holds the key to your next move." },
        { name: "The Lovers", img: "https://i.imgur.com/6EwB6Wn.jpg", msg: "A significant choice is on the horizon. Ensure your heart and mind are in perfect alignment." },
        { name: "The Chariot", img: "https://i.imgur.com/DRE9o6Q.jpg", msg: "Victory through willpower. Stay focused on your goals; your momentum is unstoppable." },
        { name: "Strength", img: "https://i.imgur.com/1GZ6Y8o.jpg", msg: "True power is found in compassion and patience. Tame your inner beasts with kindness." },
        { name: "The Hermit", img: "https://i.imgur.com/XwE8E8T.jpg", msg: "Withdrawal is necessary. Go within to find the light that will guide you through the darkness." },
        { name: "Wheel of Fortune", img: "https://i.imgur.com/mO3hW2k.jpg", msg: "Fate is turning. Prepare for a sudden shift; luck is moving in your favor today." },
        { name: "Justice", img: "https://i.imgur.com/8Q9Z9O6.jpg", msg: "Truth and accountability. The scales are balancing; act with integrity to ensure a fair outcome." },
        { name: "The Hanged Man", img: "https://i.imgur.com/L7U6r8Q.jpg", msg: "Let go of control. A new perspective can only be found by surrendering to the present moment." },
        { name: "Death", img: "https://i.imgur.com/n6S7Z9E.jpg", msg: "The old must pass away to make room for the new. Do not fear this transition; it is vital growth." },
        { name: "Temperance", img: "https://i.imgur.com/O6L6q9E.jpg", msg: "Balance is your medicine. Combine your opposing forces to find a middle path of peace." },
        { name: "The Devil", img: "https://i.imgur.com/v8R8q9E.jpg", msg: "Shadow work is required. Beware of attachments and addictions that are keeping you bound." },
        { name: "The Tower", img: "https://i.imgur.com/z6Z6q9E.jpg", msg: "Sudden upheaval. The false structures in your life are falling to reveal the absolute truth." },
        { name: "The Star", img: "https://i.imgur.com/W6W6q9E.jpg", msg: "Inspiration and hope. The universe is sending you a sign that you are on the right path." },
        { name: "The Moon", img: "https://i.imgur.com/M6M6q9E.jpg", msg: "Illusion and dreams. Not all is as it seems in the moonlight; trust your gut over your eyes." },
        { name: "The Sun", img: "https://i.imgur.com/S6S6q9E.jpg", msg: "Absolute clarity and success. Your radiance is shining brightly for all to see." },
        { name: "Judgement", img: "https://i.imgur.com/J6J6q9E.jpg", msg: "A spiritual awakening. You are being called to rise up and fulfill your highest potential." },
        { name: "The World", img: "https://i.imgur.com/w6w6q9E.jpg", msg: "Completion and harmony. You have reached the end of a cycle; celebrate your total success." }
    ];

    function beginReading() {
        const grid = document.getElementById('spreadOutput');
        const loader = document.getElementById('ritualLoader');
        const summaryBox = document.getElementById('summaryBox');
        const summaryText = document.getElementById('summaryText');
        const count = parseInt(document.getElementById('cardDepth').value);
        const style = document.getElementById('spreadStyle').value;
        const query = document.getElementById('seekerInput').value;

        grid.innerHTML = "";
        summaryBox.style.display = "none";
        loader.style.display = "block";

        let labels = ["The Insight"];
        if(count === 3) {
            if(style === "PastPresentFuture") labels = ["The Past", "The Present", "The Future"];
            else if(style === "MindBodySpirit") labels = ["The Mind", "The Body", "The Spirit"];
            else labels = ["The Situation", "The Obstacle", "The Advice"];
        } else if(count === 5) {
            labels = ["Basis", "Influence", "Action", "Obstacle", "Outcome"];
        }

        setTimeout(() => {
            loader.style.display = "none";
            let selection = [...tarotDeck].sort(() => 0.5 - Math.random()).slice(0, count);

            selection.forEach((card, i) => {
                const frame = document.createElement('div');
                frame.className = 'card-frame';
                frame.innerHTML = `
                    <div class="card-art">
                        <div class="pos-label">${labels[i] || "Energy"}</div>
                        <img src="${card.img}" alt="${card.name}">
                        <div class="card-title">${card.name}</div>
                        <div class="card-meaning">${card.msg}</div>
                    </div>
                `;
                grid.appendChild(frame);
                setTimeout(() => frame.classList.add('revealed'), i * 250);
            });

            summaryBox.style.display = "block";
            let finalNote = query ? `Regarding "${query}", the spirits speak through ${selection[0].name}. ` : "The cosmic currents are clear. ";
            finalNote += `This alignment suggests that while ${selection[0].name} sets the foundation, your success depends on the energy of ${selection[selection.length-1].name}.`;
            summaryText.innerText = finalNote;

        }, 2000);
    }
</script>

</body>
</html>
