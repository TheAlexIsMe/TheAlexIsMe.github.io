<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells | Elite Arcanum</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sakura: #ffb7d5;
            --lavender: #c8a2c8;
            --void: #0a0a0c;
            --gold: #d0a756;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--void);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- MYSTICAL LOADER --- */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }

        .loader-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 180px; height: 180px;
            font-family: "Cinzel Decorative", serif;
            font-size: 1.2em;
            font-weight: 300;
            color: white;
            border-radius: 50%;
        }

        .loader {
            position: absolute;
            top: 0; left: 0; width: 100%; aspect-ratio: 1 / 1;
            border-radius: 50%;
            animation: loader-rotate 2s linear infinite;
            z-index: 0;
        }

        @keyframes loader-rotate {
            0% { transform: rotate(90deg); box-shadow: 0 10px 20px 0 #fff inset, 0 20px 30px 0 #ad5fff inset, 0 60px 60px 0 #471eec inset; }
            50% { transform: rotate(270deg); box-shadow: 0 10px 20px 0 #fff inset, 0 20px 10px 0 #d60a47 inset, 0 40px 60px 0 #311e80 inset; }
            100% { transform: rotate(450deg); box-shadow: 0 10px 20px 0 #fff inset, 0 20px 30px 0 #ad5fff inset, 0 60px 60px 0 #471eec inset; }
        }

        .loader-letter { display: inline-block; animation: loader-letter-anim 2s infinite; z-index: 1; }
        @keyframes loader-letter-anim {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            20% { opacity: 1; transform: scale(1.15); }
            40% { opacity: 0.7; transform: translateY(0); }
        }

        /* --- BLACK HOLE BACKGROUND --- */
        .black-hole {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .black-hole::before {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150%; height: 140%;
            background: radial-gradient(ellipse at 50% 55%, transparent 10%, black 50%);
            z-index: 2;
        }

        .aura {
            position: absolute; top: -71.5%; left: 50%; transform: translateX(-50%);
            width: 40%; height: 400%;
            background: linear-gradient(20deg, #00f8f1, #ffbd1e20 16.5%, #fe848f 33%, #fe848f20 49.5%, #00f8f1 66%, #00f8f160 85.5%, #ffbd1e 100%);
            background-size: 100% 200%; border-radius: 0 0 100% 100%;
            filter: blur(50px); opacity: 0.75; z-index: 3; animation: aura-glow 5s infinite linear;
        }

        @keyframes aura-glow { 0% { background-position: 0 100%; } 100% { background-position: 0 300%; } }

        .ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; border: 1px solid #444; animation: ring-pulse 10s infinite linear;
        }
        @keyframes ring-pulse { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 100%; height: 100%; opacity: 0; } }

        /* --- MAIN UI --- */
        .content-wrapper {
            position: relative; z-index: 10;
            max-width: 1200px; margin: 0 auto;
            padding: 40px 20px; text-align: center;
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif; font-size: clamp(2rem, 6vw, 4rem);
            color: var(--sakura); letter-spacing: 10px; margin-bottom: 40px;
        }

        /* --- NEOMORPHIC BUTTON --- */
        .invoke-button {
            background: rgba(10, 10, 12, 0.8);
            border-radius: 0.5em;
            box-shadow: inset 0px -6px 18px -6px rgba(3, 15, 20, 0), inset #242b2e -1px -1px 6px 0px, rgba(36, 43, 46, 1) -1px -1px 6px 0px;
            border: solid 2px #030f14;
            cursor: pointer; font-size: 18px; padding: 0.7em 1.7em;
            transition: all 0.3s; color: var(--gold); font-family: 'Cinzel Decorative'; font-weight: 700;
            margin-top: 20px;
        }
        .invoke-button:hover { transform: scale(0.95); box-shadow: inset 0px -6px 18px -6px rgba(3, 15, 20, 1), -1px -1px 6px 0px rgba(54, 69, 75, 1); }

        /* --- INTERACTIVE CARDS --- */
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px; margin-top: 60px; justify-items: center;
        }

        .mystic-card {
            position: relative; width: 250px; height: 400px;
            background: #111; border-radius: 15px; cursor: pointer;
            border: 1px solid var(--border); overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transform: translateY(20px); transition: opacity 0.5s;
        }

        .mystic-card.show { opacity: 1; transform: translateY(0); }

        .mystic-card img { width: 85%; border-radius: 8px; margin-bottom: 10px; transition: 0.5s; }

        .card-name-label { font-family: 'Cinzel Decorative'; color: var(--sakura); font-size: 1.1rem; }

        .mystic-card::before, .mystic-card::after {
            position: absolute; content: ""; width: 0%; height: 0%;
            background-color: var(--void); transition: all 0.5s;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; color: #fff; font-size: 0.9rem; text-align: center;
            z-index: 5; line-height: 1.4;
        }

        .mystic-card::before { top: 0; right: 0; border-radius: 0 15px 0 100%; }
        .mystic-card::after { bottom: 0; left: 0; border-radius: 0 100% 0 15px; }

        .mystic-card:hover::before, .mystic-card:hover::after { width: 100%; height: 100%; border-radius: 15px; }

        .mystic-card:hover::after { content: attr(data-meaning); }

        /* --- DASHBOARD --- */
        .ritual-box {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 15px; border: 1px solid var(--border);
        }

        input {
            width: 100%; max-width: 600px; background: transparent; border: none;
            border-bottom: 2px solid var(--sakura); color: #fff; padding: 10px;
            font-size: 1.5rem; text-align: center; outline: none; margin-bottom: 20px;
        }

        select { background: #000; color: var(--sakura); border: 1px solid var(--sakura); padding: 10px; margin: 10px; }

    </style>
</head>
<body>

    <!-- PRELOADER -->
    <div id="preloader">
        <div class="loader-wrapper">
            <span class="loader-letter">C</span>
            <span class="loader-letter">o</span>
            <span class="loader-letter">n</span>
            <span class="loader-letter">j</span>
            <span class="loader-letter">u</span>
            <span class="loader-letter">r</span>
            <span class="loader-letter">i</span>
            <span class="loader-letter">n</span>
            <span class="loader-letter">g</span>
            <div class="loader"></div>
        </div>
    </div>

    <!-- BACKGROUND -->
    <div class="black-hole">
        <div class="tunnel" id="tunnel"></div>
        <div class="aura"></div>
    </div>

    <!-- CONTENT -->
    <div class="content-wrapper">
        <header>
            <h1>Mystic Spells</h1>
        </header>

        <div class="ritual-box">
            <input type="text" id="question" placeholder="Whisper your inquiry...">
            <div>
                <select id="category">
                    <option value="Daily">Daily Vibe</option>
                    <option value="Love">Love Spreads</option>
                    <option value="Career">Career Spreads</option>
                </select>
                <select id="drawCount">
                    <option value="1">1 Card</option>
                    <option value="3" selected>3 Cards</option>
                </select>
            </div>
            <button class="invoke-button" onclick="invokeRitual()">INVOKE THE ARCHETYPES</button>
        </div>

        <div class="card-grid" id="cardContainer"></div>
    </div>

    <script>
        // Generate Tunnel Rings
        const tunnel = document.getElementById('tunnel');
        for(let i=1; i<=10; i++) {
            const ring = document.createElement('div');
            ring.className = 'ring';
            ring.style.animationDelay = `${i-1}s`;
            tunnel.appendChild(ring);
        }

        // Wait for 10 seconds before hiding loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('preloader').style.display = 'none';
                }, 1000);
            }, 10000); // 10 Second Load as requested
        });

        const tarotData = [
            { name: "The Fool", img: "https://i.imgur.com/IBrMUUS.png", meaning: "Endings and new beginnings. Step into the unknown with faith." },
            { name: "The Magician", img: "https://i.imgur.com/5PidMHl.png", meaning: "Manifestation and power. You have all the tools to succeed." },
            { name: "The High Priestess", img: "https://i.imgur.com/xrsmWEA.png", meaning: "Intuition and sacred knowledge. The answers are within." },
            { name: "The Empress", img: "https://i.imgur.com/RvakGCX.png", meaning: "Abundance and nurturing. Creative projects are blooming." },
            { name: "The Emperor", img: "https://i.imgur.com/K4oVvvj.png", meaning: "Structure and authority. Establish your boundaries." },
            { name: "The Hierophant", img: "https://i.imgur.com/GRF1erw.png", meaning: "Tradition and wisdom. Seek guidance from established orders." },
            { name: "The Lovers", img: "https://i.imgur.com/DVAdlIA.png", meaning: "Harmony and choices. Align your heart with your values." },
            { name: "The Chariot", img: "https://i.imgur.com/K5lk6Om.png", meaning: "Control and victory. Drive forward with total determination." },
            { name: "Strength", img: "https://i.imgur.com/WF9jYOf.png", meaning: "Inner resilience and patience. Lead with compassion." }
            // Add more cards as needed
        ];

        function invokeRitual() {
            const count = parseInt(document.getElementById('drawCount').value);
            const container = document.getElementById('cardContainer');
            container.innerHTML = "";

            let shuffled = [...tarotData].sort(() => 0.5 - Math.random()).slice(0, count);

            shuffled.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'mystic-card';
                cardEl.setAttribute('data-meaning', card.meaning);
                cardEl.innerHTML = `
                    <img src="${card.img}" alt="${card.name}">
                    <div class="card-name-label">${card.name}</div>
                `;
                container.appendChild(cardEl);
                setTimeout(() => cardEl.classList.add('show'), index * 300);
            });
        }
    </script>
</body>
</html>
