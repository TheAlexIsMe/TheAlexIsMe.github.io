<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells | The Grand Elite Arcanum</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sakura: #ffb7d5;
            --lavender: #c8a2c8;
            --void: #0a0a0c;
            --gold: #d0a756;
            --glass-border: rgba(255, 183, 213, 0.3);
            --card-back: #0d0d0f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--void);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        /* --- 10-SECOND MYSTICAL LOADER --- */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1.5s ease-in-out;
        }

        .loader-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 250px; height: 250px;
            font-family: "Cinzel Decorative", serif;
            color: white;
            user-select: none;
        }

        .loader {
            position: absolute;
            top: 0; left: 0; width: 100%; aspect-ratio: 1 / 1;
            border-radius: 50%;
            animation: loader-rotate 2s linear infinite;
            z-index: 0;
        }

        @keyframes loader-rotate {
            0% { transform: rotate(90deg); box-shadow: 0 10px 20px 0 #fff inset, 0 20px 30px 0 #ad5fff inset, 0 60px 60px 0 #471eec inset; }
            50% { transform: rotate(270deg); box-shadow: 0 10px 20px 0 #fff inset, 0 20px 10px 0 #d60a47 inset, 0 40px 60px 0 #311e80 inset; }
            100% { transform: rotate(450deg); box-shadow: 0 10px 20px 0 #fff inset, 0 20px 30px 0 #ad5fff inset, 0 60px 60px 0 #471eec inset; }
        }

        .loader-letter { display: inline-block; opacity: 0.4; animation: loader-letter-anim 2s infinite; z-index: 1; font-size: 1.5rem; }
        .loader-letter:nth-child(1) { animation-delay: 0s; }
        .loader-letter:nth-child(2) { animation-delay: 0.1s; }
        .loader-letter:nth-child(3) { animation-delay: 0.2s; }
        .loader-letter:nth-child(4) { animation-delay: 0.3s; }
        .loader-letter:nth-child(5) { animation-delay: 0.4s; }
        .loader-letter:nth-child(6) { animation-delay: 0.5s; }
        .loader-letter:nth-child(7) { animation-delay: 0.6s; }
        .loader-letter:nth-child(8) { animation-delay: 0.7s; }
        .loader-letter:nth-child(9) { animation-delay: 0.8s; }

        @keyframes loader-letter-anim {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            20% { opacity: 1; transform: scale(1.3); color: var(--sakura); }
        }

        /* --- BLACK HOLE BACKGROUND ENGINE --- */
        .black-hole { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; }
        .black-hole::before {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150%; height: 140%; background: radial-gradient(ellipse at 50% 55%, transparent 10%, black 50%); z-index: 2;
        }
        .aura {
            position: absolute; top: -71.5%; left: 50%; transform: translateX(-50%);
            width: 40%; height: 400%; background: linear-gradient(20deg, #00f8f120, #fe848f40, #ffbd1e20);
            filter: blur(60px); opacity: 0.75; z-index: 3; animation: aura-glow 5s infinite linear;
        }
        .tunnel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; z-index: 1; }
        .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); animation: ring-pulse 10s infinite linear; }
        @keyframes aura-glow { 0% { background-position: 0 100%; } 100% { background-position: 0 300%; } }
        @keyframes ring-pulse { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 100%; height: 100%; opacity: 0; } }

        /* --- MAIN PORTAL UI --- */
        .portal-container { position: relative; z-index: 10; width: 100%; max-width: 1300px; padding: 60px 20px; text-align: center; }
        .main-logo { max-width: 450px; width: 100%; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--sakura)); }

        .ritual-vault {
            background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(40px);
            padding: 50px; border-radius: 20px; border: 1px solid var(--glass-border);
            margin-bottom: 60px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        input {
            width: 100%; max-width: 800px; background: transparent; border: none; border-bottom: 2px solid var(--sakura);
            color: #fff; padding: 15px; font-size: 2rem; text-align: center; outline: none; margin-bottom: 40px;
            font-family: 'Playfair Display', serif;
        }

        select { background: #000; color: var(--sakura); border: 1px solid var(--sakura); padding: 12px; margin: 10px; border-radius: 8px; font-family: 'Montserrat'; }

        /* NEOMORPHIC INVOKE BUTTON */
        .btn-invoke {
            background: var(--card-back); border-radius: 0.5em; border: solid 2px #030f14;
            box-shadow: inset 0px -6px 18px -6px rgba(3, 15, 20, 0), inset rgba(54, 69, 75, 1) -1px -1px 6px 0px, rgba(54, 69, 75, 1) -1px -1px 6px 0px;
            cursor: pointer; padding: 1.5em 4em; transition: all 0.3s; user-select: none;
            display: inline-block; margin-top: 30px;
        }
        .btn-invoke .text { color: var(--gold); font-weight: 700; font-family: 'Cinzel Decorative'; letter-spacing: 6px; font-size: 22px; transition: all 0.3s; }
        .btn-invoke:hover { box-shadow: inset 0px -6px 18px -6px rgba(3, 15, 20, 1), 0 0 40px var(--sakura); }
        .btn-invoke:active .text { transform: scale(0.85); }

        /* --- SPREAD SYSTEM --- */
        .card-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 40px; margin-top: 60px; }

        .mystic-card {
            position: relative; width: 280px; height: 460px; background: #000;
            border-radius: 24px; cursor: pointer; border: 2px solid var(--glass-border);
            opacity: 0; transform: translateY(40px); transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }
        .mystic-card.active { opacity: 1; transform: translateY(0); }
        .mystic-card img { width: 100%; height: auto; padding: 10px; border-radius: 30px; display: block; }
        .card-label { font-family: 'Cinzel Decorative'; color: var(--sakura); font-size: 1.3rem; padding-bottom: 25px; margin-top: auto; }

        /* SHUTTER HOVER EFFECT */
        .mystic-card::before, .mystic-card::after {
            position: absolute; content: ""; width: 0%; height: 0%;
            background-color: rgba(5, 5, 5, 0.98); transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; align-items: center; justify-content: center;
            padding: 35px; color: var(--sakura); font-size: 1.1rem; text-align: center;
            z-index: 20; font-family: 'Playfair Display'; font-style: italic; line-height: 1.7;
        }
        .mystic-card::before { top: 0; right: 0; border-radius: 0 24px 0 100%; }
        .mystic-card::after { bottom: 0; left: 0; border-radius: 0 100% 0 24px; }
        .mystic-card:hover::before, .mystic-card:hover:after { width: 100%; height: 100%; border-radius: 24px; }
        .mystic-card:hover::after { content: attr(data-definition); }

        /* AI DECREE SUMMARY */
        .ai-summary-box { margin-top: 80px; padding: 60px; border-top: 1px solid var(--glass-border); display: none; }
        #aiOutput { font-family: 'Playfair Display'; font-size: 2.4rem; color: var(--sakura); font-style: italic; max-width: 1000px; margin: 0 auto; line-height: 1.4; text-shadow: 0 0 15px rgba(255, 183, 213, 0.3); }

    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-wrapper">
            <span class="loader-letter">C</span><span class="loader-letter">o</span><span class="loader-letter">n</span>

        function performRitual() {
            const grid = document.getElementById('ritualDisplay');
            const summary = document.getElementById('aiVault');
            const aiText = document.getElementById('aiOutput');
            const count = parseInt(document.getElementById('drawNum').value);
            const cat = document.getElementById('spreadCat').value;
            const q = document.getElementById('seekerQ').value;

            grid.innerHTML = "";
            summary.style.display = "none";

            // Draw Cards
            let shuffled = [...masterDeck].sort(() => 0.5 - Math.random()).slice(0, count);

            shuffled.forEach((card, i) => {
                const el = document.createElement('div');
                el.className = 'mystic-card';
                el.setAttribute('data-definition', card.def);
                
                // Image or Placeholder logic
                const finalImg = card.img ? card.img : `https://placehold.jp/40/ffb7d5/000000/300x500.png?text=${card.name}`;
                
                el.innerHTML = `
                    <img src="${finalImg}" alt="${card.name}">
                    <div class="card-label">${card.name}</div>
                `;
                grid.appendChild(el);
                setTimeout(() => el.classList.add('active'), i * 300);
            });

            // AI SYNTHESIS ENGINE
            setTimeout(() => {
                summary.style.display = "block";
                let decree = q ? `In response to your query: "${q}"... ` : "The Archetypes have aligned. ";

                // Auto-scroll to summary
                window.scrollTo({ top: summary.offsetTop - 50, behavior: 'smooth' });
            }, (count * 300) + 500);
