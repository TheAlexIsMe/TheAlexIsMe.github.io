<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells | Elite Euphoria Readings</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sakura: #ffb7d5;
            --lavender: #c8a2c8;
            --void: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 183, 213, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--void);
            background-image: radial-gradient(circle at 50% 50%, #1e0030 0%, #050505 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .container {
            width: 95%;
            max-width: 1400px;
            padding: 80px 20px;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* Branding matched to your logo */
        header { margin-bottom: 60px; }
        
        .brand-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            letter-spacing: 20px;
            background: linear-gradient(to bottom, #fff, var(--sakura), var(--lavender));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 183, 213, 0.5));
            text-transform: uppercase;
        }

        .brand-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--sakura);
            letter-spacing: 8px;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* Ritual Interface - Refined for image_722079.jpg */
        .ritual-frame {
            background: var(--glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border);
            padding: 60px 40px;
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            margin-bottom: 80px;
        }

        input[type="text"] {
            width: 100%;
            max-width: 800px;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--sakura);
            padding: 15px 0;
            color: #fff;
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            text-align: center;
            outline: none;
            margin-bottom: 40px;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        select {
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--sakura);
            color: var(--sakura);
            padding: 12px 25px;
            font-family: 'Montserrat';
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .invoke-btn {
            padding: 22px 80px;
            background: linear-gradient(45deg, var(--sakura), var(--lavender));
            border: none;
            color: #000;
            font-family: 'Cinzel Decorative';
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 6px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 183, 213, 0.3);
            transition: 0.4s;
        }

        .invoke-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 50px var(--sakura);
            color: #fff;
        }

        /* Results Display */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .card-slot { opacity: 0; transform: translateY(40px); transition: 0.8s ease-out; }
        .card-slot.active { opacity: 1; transform: translateY(0); }

        .card-box {
            background: #111;
            border: 1px solid rgba(255, 183, 213, 0.1);
            padding: 25px;
            height: 100%;
            transition: 0.4s;
        }

        .card-box img {
            width: 100%;
            filter: sepia(0.2) contrast(1.1);
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .pos-tag {
            font-family: 'Cinzel Decorative';
            font-size: 0.75rem;
            color: var(--sakura);
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card-title { font-family: 'Playfair Display'; font-size: 2rem; margin-bottom: 10px; color: var(--sakura); }
        .card-meaning { font-size: 0.95rem; color: #ccc; line-height: 1.5; text-align: justify; }

        .decree-box {
            margin-top: 80px;
            padding: 60px 40px;
            border-top: 1px solid var(--border);
            display: none;
        }

        #aiText {
            font-family: 'Playfair Display';
            font-size: 2.2rem;
            max-width: 900px;
            margin: 0 auto;
            color: var(--sakura);
            line-height: 1.4;
            font-style: italic;
        }

        .loader {
            display: none;
            width: 60px; height: 60px;
            border: 3px solid var(--glass);
            border-top-color: var(--sakura);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 50px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
    <header>
        <h1 class="brand-title">Mystic Spells</h1>
        <div class="brand-subtitle">The Elite Sanctuary for Euphoria Readings</div>
    </header>

    <div class="ritual-frame">
        <input type="text" id="seekerQuestion" placeholder="WHISPER YOUR QUESTION TO THE VOID...">
        
        <div class="control-row">
            <select id="spreadCat">
                <option value="Daily">Daily Practice Spreads</option>
                <option value="Love">❤️ Love & Relationships Spreads</option>
                <option value="Career">💼 Career & Path Spreads</option>
                <option value="Spiritual">✨ Spiritual Growth Spreads</option>
            </select>
            <select id="spreadType">
                <option value="1">Direct Answer (1 Card)</option>
                <option value="3" selected>The Trifecta Revelation (3 Cards)</option>
                <option value="5">The Grand Revelation (5 Cards)</option>
            </select>
        </div>

        <button class="invoke-btn" onclick="startRitual()">Invoke the Archetypes</button>
    </div>

    <div class="loader" id="ritualLoader"></div>
    <div class="card-grid" id="ritualOutput"></div>

    <div class="decree-box" id="oracleBox">
        <div class="pos-tag">The Oracle's Synthesis</div>
        <p id="aiText"></p>
    </div>
</div>

<script>
    /* Sakura Star Engine */
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    class Star {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.speedY = Math.random() * 0.5 + 0.1;
            this.opacity = Math.random();
        }
        update() {
            this.y += this.speedY;
            if (this.y > canvas.height) this.reset();
        }
        draw() {
            ctx.fillStyle = `rgba(255, 183, 213, ${this.opacity})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    function init() {
        resize();
        for (let i = 0; i < 100; i++) particles.push(new Star());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    init(); animate();

    /* Arcanum Engine */
    const deck = [
        { name: "The Fool", img: "https://i.imgur.com/IBrMUUS.png", meaning: "Upright: innocence, new beginnings, free spirit. Reversed: recklessness." },
        { name: "The Magician", img: "https://i.imgur.com/5PidMHl.png", meaning: "Upright: manifestation, power, skill, action. Reversed: manipulation." },
        { name: "The High Priestess", img: "https://i.imgur.com/xrsmWEA.png", meaning: "Upright: intuition, sacred knowledge, mystery. Reversed: secrets." },
        { name: "The Empress", img: "https://i.imgur.com/RvakGCX.png", meaning: "Upright: femininity, abundance, nurturing, creation. Reversed: creative block." },
        { name: "The Emperor", img: "https://i.imgur.com/K4oVvvj.png", meaning: "Upright: authority, structure, stability, leadership. Reversed: control issues." },
        { name: "The Hierophant", img: "https://i.imgur.com/GRF1erw.png", meaning: "Upright: tradition, spiritual wisdom, conformity. Reversed: rebellion." },
        { name: "The Lovers", img: "https://i.imgur.com/DVAdlIA.png", meaning: "Upright: love, harmony, values alignment. Reversed: imbalance." },
        { name: "The Chariot", img: "https://i.imgur.com/K5lk6Om.png", meaning: "Upright: determination, control, ambition, victory. Reversed: lack of direction." },
        { name: "Strength", img: "https://i.imgur.com/WF9jYOf.png", meaning: "Upright: courage, inner strength, patience, compassion. Reversed: self-doubt." },
        { name: "The Hermit", img: "https://i.imgur.com/GgoMlM8.png", meaning: "Upright: introspection, solitude, inner guidance. Reversed: isolation." },
        { name: "Wheel of Fortune", img: "https://i.imgur.com/oQ7dG8i.png", meaning: "Upright: change, destiny, cycles. Reversed: bad timing." },
        { name: "Justice", img: "https://i.imgur.com/xxvbuEe.png", meaning: "Upright: truth, fairness, accountability. Reversed: dishonesty." },
        { name: "The Hanged Man", img: "https://i.imgur.com/b71lXKz.png", meaning: "Upright: surrender, new perspective, pause. Reversed: resistance." },
        { name: "Death", img: "https://i.imgur.com/WB1hQzH.png", meaning: "Upright: endings, transformation, rebirth. Reversed: fear of change." },
        { name: "Temperance", img: "https://i.imgur.com/2rUNAHs.png", meaning: "Upright: balance, moderation, harmony. Reversed: imbalance." },
        { name: "The Devil", img: "https://i.imgur.com/WA3Zekv.png", meaning: "Upright: attachment, temptation, material focus. Reversed: release." },
        { name: "The Tower", img: "https://i.imgur.com/OGbBcsY.png", meaning: "Upright: sudden change, upheaval, revelation. Reversed: delayed disaster." },
        { name: "The Star", img: "https://i.imgur.com/zf2SNWL.png", meaning: "Upright: hope, renewal, faith, healing. Reversed: despair." },
        { name: "The Moon", img: "https://i.imgur.com/uaLXrGB.png", meaning: "Upright: illusion, intuition, uncertainty. Reversed: clarity." },
        { name: "The Sun", img: "https://i.imgur.com/FxEoqnn.png", meaning: "Upright: joy, success, vitality, clarity. Reversed: temporary sadness." },
        { name: "Judgement", img: "https://i.imgur.com/9E5aH31.png", meaning: "Upright: awakening, renewal, decisive moment. Reversed: self-doubt." },
        { name: "The World", img: "https://i.imgur.com/XdoOTCP.png", meaning: "Upright: completion, fulfillment, integration. Reversed: lack of closure." }
    ];

    function startRitual() {
        const grid = document.getElementById('ritualOutput');
        const loader = document.getElementById('ritualLoader');
        const box = document.getElementById('oracleBox');
        const aiText = document.getElementById('aiText');
        const count = parseInt(document.getElementById('spreadType').value);
        const cat = document.getElementById('spreadCat').value;
        const q = document.getElementById('seekerQuestion').value;

        grid.innerHTML = "";
        box.style.display = "none";
        loader.style.display = "block";

        let labels = ["The Insight"];
        if(count === 3) {
            if(cat === "Love") labels = ["You", "The Connection", "The Outcome"];
            else if(cat === "Career") labels = ["Past Efforts", "Present Work", "Success Path"];
            else labels = ["The Past", "The Present", "The Future"];
        } else if(count === 5) {
            labels = ["Foundation", "Challenge", "Advice", "Outer Influence", "Result"];
        }

        setTimeout(() => {
            loader.style.display = "none";
            let selection = [...deck].sort(() => 0.5 - Math.random()).slice(0, count);

            selection.forEach((card, i) => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="card-box">
                        <div class="pos-tag">${labels[i] || "Energy"}</div>
                        <img src="${card.img}" alt="${card.name}">
                        <div class="card-title">${card.name}</div>
                        <div class="card-meaning">${card.meaning}</div>
                    </div>
                `;
                grid.appendChild(slot);
                setTimeout(() => slot.classList.add('active'), i * 300);
            });

            box.style.display = "block";
            aiText.innerText = q ? `In response to "${q}"... the spirits manifest through ${selection[0].name}. Your ${cat} path is ultimately tethered to the power of ${selection[selection.length-1].name}.` : "The veil has parted. Your journey is now illuminated.";
        }, 2000);
    }
</script>

</body>
</html>
