<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Spells | Euphoria Readings</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sakura: #ffb7d5;
            --lavender: #c8a2c8;
            --void: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 183, 213, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--void);
            background-image: radial-gradient(circle at 50% 50%, #1e0030 0%, #050505 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        /* Animated Particles Background */
        #particles-js {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-content { position: relative; z-index: 2; }

        /* Branding matched to logo */
        .brand-logo {
            max-width: 400px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--sakura));
        }

        .brand-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            background: linear-gradient(to bottom, #fff, var(--sakura), var(--lavender));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            letter-spacing: 10px;
        }

        /* Interface Dashboard */
        .ritual-vault {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 50px;
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            margin-bottom: 60px;
        }

        input[type="text"] {
            width: 100%;
            max-width: 800px;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--sakura);
            padding: 15px 0;
            color: #fff;
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            text-align: center;
            outline: none;
            margin-bottom: 30px;
        }

        .controls { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

        select {
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--sakura);
            color: var(--sakura);
            padding: 12px 25px;
            font-family: 'Montserrat';
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .invoke-btn {
            margin-top: 40px;
            padding: 22px 100px;
            background: linear-gradient(45deg, var(--sakura), var(--lavender));
            border: none;
            color: #000;
            font-family: 'Cinzel Decorative';
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 6px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 183, 213, 0.3);
            transition: 0.4s;
        }

        .invoke-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 50px var(--sakura);
            color: #fff;
        }

        /* Advanced Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card-slot { opacity: 0; transform: translateY(40px); transition: 0.8s ease-out; }
        .card-slot.active { opacity: 1; transform: translateY(0); }

        .card-box {
            background: #111;
            border: 1px solid var(--border);
            padding: 20px;
            height: 100%;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .card-box:hover { border-color: var(--sakura); box-shadow: 0 0 40px rgba(255, 183, 213, 0.2); }

        .card-box img {
            width: 100%;
            filter: sepia(0.2) contrast(1.1);
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .pos-label {
            font-family: 'Cinzel Decorative';
            font-size: 0.75rem;
            color: var(--sakura);
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .card-title { font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 10px; color: var(--sakura); }

        .card-meaning { font-size: 0.9rem; color: #ccc; line-height: 1.6; text-align: justify; border-top: 1px solid var(--border); padding-top: 15px; }

        /* AI Decrees Section */
        .decree-vault {
            margin-top: 80px;
            padding: 60px 40px;
            border-top: 1px solid var(--border);
            display: none;
            background: rgba(255, 183, 213, 0.02);
        }

        #aiDecree {
            font-family: 'Playfair Display';
            font-size: 2.2rem;
            max-width: 1000px;
            margin: 0 auto;
            color: var(--sakura);
            line-height: 1.4;
            font-style: italic;
        }

        .loader {
            display: none;
            width: 80px; height: 80px;
            border: 3px solid var(--glass);
            border-top-color: var(--sakura);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 50px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="container main-content">
    <header>
        <!-- Replace with your logo file if available on GitHub -->
        <h1 class="brand-title">Mystic Spells</h1>
        <p class="brand-subtitle">✨ Euphoria Readings ✨</p>
    </header>

    <div class="ritual-vault">
        <input type="text" id="seekerQuestion" placeholder="COMMUNE WITH THE ARCHETYPES...">
        
        <div class="controls">
            <select id="spreadCategory">
                <option value="Daily">Daily Practice</option>
                <option value="Love">Love & Relationships</option>
                <option value="Career">Career & Path</option>
                <option value="Spiritual">Spiritual Growth</option>
            </select>
            <select id="spreadLayout">
                <option value="1">Direct Answer (1 Card)</option>
                <option value="3" selected>The Trifecta (3 Cards)</option>
                <option value="5">The Grand Revelation (5 Cards)</option>
            </select>
        </div>

        <button class="invoke-btn" onclick="performRitual()">INVOKE THE SPIRITS</button>
    </div>

    <div class="loader" id="ritualLoader"></div>
    <div class="card-grid" id="ritualOutput"></div>

    <div class="decree-vault" id="oracleBox">
        <div class="pos-label">THE ORACLE'S DECREE</div>
        <p id="aiDecree"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    /* PARTICLES CONFIG */
    particlesJS('particles-js', {
        "particles": {
            "number": { "value": 80 },
            "color": { "value": "#ffb7d5" },
            "opacity": { "value": 0.5 },
            "size": { "value": 2 },
            "line_linked": { "enable": false },
            "move": { "speed": 1, "direction": "top" }
        }
    });

    /* FULL DATA ENGINE */
    const tarotDeck = [
        // Major Arcana with your specific images
        { name: "The Fool", img: "https://i.imgur.com/IBrMUUS.png", meaning: "Upright: innocence, new beginnings, free spirit. Reversed: recklessness." },
        { name: "The Magician", img: "https://i.imgur.com/5PidMHl.png", meaning: "Upright: manifestation, power, skill, action. Reversed: manipulation." },
        { name: "The High Priestess", img: "https://i.imgur.com/xrsmWEA.png", meaning: "Upright: intuition, sacred knowledge, mystery. Reversed: secrets." },
        { name: "The Empress", img: "https://i.imgur.com/RvakGCX.png", meaning: "Upright: femininity, abundance, nurturing, creation. Reversed: creative block." },
        { name: "The Emperor", img: "https://i.imgur.com/K4oVvvj.png", meaning: "Upright: authority, structure, stability, leadership. Reversed: control issues." },
        { name: "The Hierophant", img: "https://i.imgur.com/GRF1erw.png", meaning: "Upright: tradition, spiritual wisdom, conformity. Reversed: rebellion." },
        { name: "The Lovers", img: "https://i.imgur.com/DVAdlIA.png", meaning: "Upright: love, harmony, values alignment. Reversed: imbalance." },
        { name: "The Chariot", img: "https://i.imgur.com/K5lk6Om.png", meaning: "Upright: determination, control, ambition, victory. Reversed: lack of direction." },
        { name: "Strength", img: "https://i.imgur.com/WF9jYOf.png", meaning: "Upright: courage, inner strength, patience, compassion. Reversed: self-doubt." },
        { name: "The Hermit", img: "https://i.imgur.com/GgoMlM8.png", meaning: "Upright: introspection, solitude, inner guidance. Reversed: isolation." },
        { name: "Wheel of Fortune", img: "https://i.imgur.com/oQ7dG8i.png", meaning: "Upright: change, destiny, cycles. Reversed: bad timing." },
        { name: "Justice", img: "https://i.imgur.com/xxvbuEe.png", meaning: "Upright: truth, fairness, accountability. Reversed: dishonesty." },
        { name: "The Hanged Man", img: "https://i.imgur.com/b71lXKz.png", meaning: "Upright: surrender, new perspective, pause. Reversed: resistance." },
        { name: "Death", img: "https://i.imgur.com/WB1hQzH.png", meaning: "Upright: endings, transformation, rebirth. Reversed: fear of change." },
        { name: "Temperance", img: "https://i.imgur.com/2rUNAHs.png", meaning: "Upright: balance, moderation, harmony. Reversed: imbalance." },
        { name: "The Devil", img: "https://i.imgur.com/WA3Zekv.png", meaning: "Upright: attachment, temptation, material focus. Reversed: release." },
        { name: "The Tower", img: "https://i.imgur.com/OGbBcsY.png", meaning: "Upright: sudden change, upheaval, revelation. Reversed: delayed disaster." },
        { name: "The Star", img: "https://i.imgur.com/zf2SNWL.png", meaning: "Upright: hope, renewal, faith, healing. Reversed: despair." },
        { name: "The Moon", img: "https://i.imgur.com/uaLXrGB.png", meaning: "Upright: illusion, intuition, uncertainty. Reversed: clarity." },
        { name: "The Sun", img: "https://i.imgur.com/FxEoqnn.png", meaning: "Upright: joy, success, vitality, clarity. Reversed: temporary sadness." },
        { name: "Judgement", img: "https://i.imgur.com/9E5aH31.png", meaning: "Upright: awakening, renewal, decisive moment. Reversed: self-doubt." },
        { name: "The World", img: "https://i.imgur.com/XdoOTCP.png", meaning: "Upright: completion, fulfillment, integration. Reversed: lack of closure." },
        // Minor Arcana (Placeholder Image - Use your actual links here)
        { name: "Ace of Wands", img: "https://placehold.jp/40/ffb7d5/ffffff/300x500.png?text=Wands", meaning: "Inspiration, new opportunities, growth." },
        { name: "Ace of Cups", img: "https://placehold.jp/40/c8a2c8/ffffff/300x500.png?text=Cups", meaning: "New emotions, love, compassion." },
        { name: "Ace of Swords", img: "https://placehold.jp/40/ffffff/000000/300x500.png?text=Swords", meaning: "Clarity, truth, breakthrough." },
        { name: "Ace of Pentacles", img: "https://placehold.jp/40/d4af37/ffffff/300x500.png?text=Pentacles", meaning: "New financial opportunity, stability." }
    ];

    function performRitual() {
        const output = document.getElementById('ritualOutput');
        const loader = document.getElementById('ritualLoader');
        const box = document.getElementById('oracleBox');
        const decree = document.getElementById('aiDecree');
        const count = parseInt(document.getElementById('spreadLayout').value);
        const category = document.getElementById('spreadCategory').value;
        const query = document.getElementById('seekerQuestion').value;

        output.innerHTML = "";
        box.style.display = "none";
        loader.style.display = "block";

        let labels = ["Insight"];
        if(count === 3) {
            if(category === "Love") labels = ["You", "The Connection", "The Outcome"];
            else if(category === "Career") labels = ["Past Efforts", "Present Work", "Success Path"];
            else labels = ["The Past", "The Present", "The Future"];
        } else if(count === 5) {
            labels = ["Foundation", "Blockage", "Advice", "External Factor", "Final Result"];
        }

        setTimeout(() => {
            loader.style.display = "none";
            let selection = [...tarotDeck].sort(() => 0.5 - Math.random()).slice(0, count);

            selection.forEach((card, i) => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.innerHTML = `
                    <div class="card-box">
                        <div class="pos-label">${labels[i] || "Energy"}</div>
                        <img src="${card.img}" alt="${card.name}">
                        <div class="card-title">${card.name}</div>
                        <div class="card-meaning">${card.meaning}</div>
                    </div>
                `;
                output.appendChild(slot);
                setTimeout(() => slot.classList.add('active'), i * 300);
            });

            box.style.display = "block";
            let response = query ? `Regarding your ${category} inquiry: "${query}"... ` : "The spirits have heard your silence. ";
            response += `The presence of ${selection[0].name} sets the stage, while ${selection[selection.length-1].name} marks the final revelation of this Euphoria reading.`;
            decree.innerText = response;

        }, 2000);
    }
</script>

</body>
</html>
